<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription — StudyHub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">

            <div class="logo">Study<span>Hub</span></div>
            <h2>Crée ton compte étudiant</h2>

            <div id="alert" class="alert" style="display:none;"></div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fa-solid fa-user" style="color:#6B7280; margin-right:6px;"></i>Nom d'utilisateur</label>
                    <input type="text" id="username" placeholder="tonusername">
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-envelope" style="color:#6B7280; margin-right:6px;"></i>Email</label>
                    <input type="email" id="email" placeholder="ton@email.com">
                </div>
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-lock" style="color:#6B7280; margin-right:6px;"></i>Mot de passe</label>
                <div style="position:relative;">
                    <input type="password" id="password" placeholder="••••••••" style="padding-right:3rem;">
                    <i class="fa-solid fa-eye" id="toggle-pwd"
                       onclick="togglePassword()"
                       style="position:absolute; right:1rem; top:50%; transform:translateY(-50%);
                              cursor:pointer; color:#6B7280;"></i>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fa-solid fa-graduation-cap" style="color:#6B7280; margin-right:6px;"></i>Filière</label>
                    <input type="text" id="filiere" placeholder="ex: Informatique">
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-layer-group" style="color:#6B7280; margin-right:6px;"></i>Niveau</label>
                    <select id="niveau">
                        <option value="">-- Niveau --</option>
                        <option value="L1">Licence 1</option>
                        <option value="L2">Licence 2</option>
                        <option value="L3">Licence 3</option>
                        <option value="M1">Master 1</option>
                        <option value="M2">Master 2</option>
                    </select>
                </div>
            </div>

            <button class="btn btn-primary btn-lg" style="width:100%; justify-content:center; margin-top:0.5rem;" onclick="register()">
                <i class="fa-solid fa-user-plus"></i>
                Créer mon compte
            </button>

            <div class="auth-footer">
                Déjà un compte ? <a href="/login" style="font-weight:600;">Se connecter</a>
            </div>

        </div>
    </div>

    <script>
        async function register() {
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const filiere = document.getElementById('filiere').value;
            const niveau = document.getElementById('niveau').value;

            if (!username || !email || !password) {
                showAlert('Veuillez remplir les champs obligatoires.', 'error');
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, filiere, niveau })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showAlert('Inscription réussie ! Redirection...', 'success');
                    setTimeout(() => window.location.href = '/dashboard', 1500);
                } else {
                    showAlert(data.error, 'error');
                }
            } catch (err) {
                showAlert('Erreur de connexion au serveur.', 'error');
            }
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.innerHTML = `<i class="fa-solid fa-${type === 'error' ? 'circle-exclamation' : 'circle-check'}"></i> ${message}`;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'flex';
        }

        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('toggle-pwd');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.className = 'fa-solid fa-eye-slash';
            } else {
                pwd.type = 'password';
                icon.className = 'fa-solid fa-eye';
            }
        }
    </script>

</body>
</html>
